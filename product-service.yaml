apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: mohammedsafik/bpro
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  type: NodePort
  ports:
    - port: 82
      targetPort: 4001
      nodePort: 30004
      