apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: mohammedsafik/bin:1
          imagePullPolicy: Always
          ports:
            - containerPort: 4003
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
spec:
  selector:
    app: inventory-service
  type: NodePort
  ports:
    - port: 88
      targetPort: 4003
      nodePort: 30007
      