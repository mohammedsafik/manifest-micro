apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'microservices'
        static_configs:
          - targets:
              - order-service.default.svc.cluster.local:83
              - default.svc.cluster.local:81
              - default.svc.cluster.local:82
              - default.svc.cluster.local:88
              - default.svc.cluster.local:85
              - default.svc.cluster.local:80